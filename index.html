<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Derby FTBL — Конструктор формы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
  <style>
    /* ─── TOKENS ─────────────────────────────────────────────────── */
    :root {
      --bg:         #080808;
      --panel:      #101010;
      --panel2:     #161616;
      --border:     #252525;
      --border2:    #1e1e1e;
      --accent:     #c8f135;
      --accent2:    #9abf1a;
      --text:       #f0f0f0;
      --text-muted: #666;
      --text-dim:   #999;
      --danger:     #e05252;
      --panel-w:    260px;
      --header-h:   52px;
    }

    /* ─── RESET ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.4;
    }

    /* ─── SCROLLBAR ──────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }

    /* ─── LAYOUT ─────────────────────────────────────────────────── */
    #app {
      display: grid;
      grid-template-rows: var(--header-h) 1fr;
      grid-template-columns: var(--panel-w) 1fr var(--panel-w);
      height: 100vh;
    }

    /* ─── HEADER ─────────────────────────────────────────────────── */
    #header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 20px;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    #header .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: 15px;
      letter-spacing: -0.3px;
    }

    #header .logo-mark {
      background: var(--accent);
      color: #000;
      font-size: 11px;
      font-weight: 800;
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 0.5px;
    }

    #header .tagline {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 400;
    }

    #header-actions {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── PANELS ─────────────────────────────────────────────────── */
    #left-panel, #right-panel {
      background: var(--panel);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      overflow-x: hidden;
    }
    #right-panel { border-right: none; border-left: 1px solid var(--border); }

    /* ─── CANVAS AREA ────────────────────────────────────────────── */
    #canvas-area {
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #canvas-wrap {
      position: relative;
      border: 1px solid #1f1f1f;
      box-shadow: 0 0 60px rgba(200, 241, 53, 0.04), 0 0 0 1px rgba(200,241,53,0.05);
      border-radius: 2px;
    }

    #canvas-wrap canvas { display: block; }

    #canvas-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      color: var(--text-muted);
      pointer-events: none;
      transition: opacity 0.3s;
    }

    #canvas-placeholder svg { opacity: 0.3; }
    #canvas-placeholder p { font-size: 13px; }
    #canvas-placeholder .hint { font-size: 11px; color: #444; }

    /* ─── SECTION HEADER ─────────────────────────────────────────── */
    .section-head {
      padding: 10px 14px 8px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border2);
      position: sticky;
      top: 0;
      background: var(--panel);
      z-index: 1;
    }

    .section-body { padding: 10px 12px; }
    .section-body + .section-head { margin-top: 4px; }

    /* ─── BUTTONS ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 7px 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }
    .btn-primary:hover { background: var(--accent2); }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { background: var(--panel2); color: var(--text); border-color: #333; }

    .btn-panel {
      background: var(--panel2);
      color: var(--text-dim);
      border: 1px solid var(--border2);
      width: 100%;
    }
    .btn-panel:hover { background: #1f1f1f; color: var(--text); }

    .btn-icon {
      padding: 6px;
      background: var(--panel2);
      color: var(--text-dim);
      border: 1px solid var(--border2);
      border-radius: 4px;
      line-height: 1;
    }
    .btn-icon:hover { color: var(--text); background: #1e1e1e; }
    .btn-icon.danger:hover { color: var(--danger); }

    .btn-accent-ghost {
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(200,241,53,0.25);
    }
    .btn-accent-ghost:hover { background: rgba(200,241,53,0.07); }

    .btn-download {
      background: var(--accent);
      color: #000;
      padding: 8px 18px;
      font-size: 13px;
    }
    .btn-download:hover { background: var(--accent2); }

    .btn-row { display: flex; gap: 6px; margin-bottom: 6px; }
    .btn-row .btn { flex: 1; }

    /* ─── FORM CONTROLS ───────────────────────────────────────────── */
    .form-group { margin-bottom: 10px; }
    .form-group label {
      display: block;
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 4px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .form-input, .form-select, .form-textarea {
      width: 100%;
      background: var(--panel2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 6px 9px;
      font-family: inherit;
      font-size: 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .form-input:focus, .form-select:focus { border-color: rgba(200,241,53,0.4); }
    .form-select { cursor: pointer; }
    .form-select option { background: #161616; }

    .form-row { display: flex; gap: 6px; }
    .form-row .form-group { flex: 1; }

    /* Color input special */
    input[type="color"] {
      -webkit-appearance: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      width: 100%;
      height: 30px;
      padding: 2px 4px;
      background: var(--panel2);
      cursor: pointer;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 2px; }

    /* Range input */
    input[type="range"] {
      -webkit-appearance: none;
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      margin: 4px 0;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    .range-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .range-row input[type="range"] { flex: 1; }
    .range-val {
      font-size: 11px;
      color: var(--text-dim);
      min-width: 28px;
      text-align: right;
    }

    /* ─── LAYER LIST ─────────────────────────────────────────────── */
    #layer-list { list-style: none; }

    .layer-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-bottom: 1px solid var(--border2);
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .layer-item:hover { background: var(--panel2); }
    .layer-item.active { background: rgba(200,241,53,0.06); border-left: 2px solid var(--accent); padding-left: 10px; }

    .layer-icon {
      font-size: 11px;
      width: 18px;
      text-align: center;
      flex-shrink: 0;
      opacity: 0.7;
    }

    .layer-name {
      flex: 1;
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .layer-actions { display: flex; gap: 2px; flex-shrink: 0; }
    .layer-actions button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 2px 4px;
      font-size: 13px;
      border-radius: 3px;
      transition: color 0.1s;
    }
    .layer-actions button:hover { color: var(--text); }
    .layer-actions button.del:hover { color: var(--danger); }

    /* ─── EMPTY STATE ────────────────────────────────────────────── */
    .empty-state {
      padding: 20px 14px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }

    /* ─── PROPS PANEL ────────────────────────────────────────────── */
    #props-empty {
      padding: 24px 14px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }
    #props-panel { display: none; }
    #props-panel.visible { display: block; }

    /* ─── UPLOAD ZONE ────────────────────────────────────────────── */
    .upload-zone {
      border: 1px dashed var(--border);
      border-radius: 4px;
      padding: 14px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      color: var(--text-muted);
      font-size: 12px;
    }
    .upload-zone:hover { border-color: var(--accent); background: rgba(200,241,53,0.03); color: var(--text); }
    .upload-zone .ico { font-size: 20px; margin-bottom: 4px; opacity: 0.5; }

    input[type="file"] { display: none; }

    /* ─── TOAST ──────────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: #1a1a1a;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 16px;
      border-radius: 5px;
      font-size: 12px;
      transition: transform 0.25s ease;
      z-index: 1000;
      pointer-events: none;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ─── MOBILE TOGGLE ──────────────────────────────────────────── */
    .panel-toggle-btn {
      display: none;
      position: fixed;
      bottom: 16px;
      z-index: 100;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 18px;
      cursor: pointer;
    }

    /* ─── DIVIDER ────────────────────────────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--border2); margin: 6px 0; }

    /* ─── RESPONSIVE ─────────────────────────────────────────────── */
    @media (max-width: 900px) {
      #app {
        grid-template-columns: 240px 1fr;
        grid-template-rows: var(--header-h) 1fr;
      }
      #right-panel {
        display: none;
        position: fixed;
        right: 0;
        top: var(--header-h);
        bottom: 0;
        width: 240px;
        z-index: 50;
        border-left: 1px solid var(--border);
      }
      #right-panel.open { display: block; }
      .panel-toggle-btn { display: flex; align-items: center; justify-content: center; right: 16px; }
    }

    @media (max-width: 640px) {
      #app { grid-template-columns: 1fr; }
      #left-panel {
        display: none;
        position: fixed;
        left: 0;
        top: var(--header-h);
        bottom: 0;
        width: 240px;
        z-index: 50;
        border-right: 1px solid var(--border);
      }
      #left-panel.open { display: block; }
    }

    /* ─── FONT CHIPS ─────────────────────────────────────────────── */
    .font-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: var(--panel2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 11px;
      color: var(--text-dim);
      margin: 2px;
    }
    .font-chip button {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
      padding: 0 1px;
      line-height: 1;
    }
    .font-chip button:hover { color: var(--danger); }
    #font-chips { flex-wrap: wrap; display: flex; margin-top: 6px; min-height: 10px; }
  </style>
</head>
<body>
<div id="app">

  <!-- ══ HEADER ══════════════════════════════════════════════════ -->
  <header id="header">
    <div class="logo">
      <span class="logo-mark">DERBY</span>
      <span>Конструктор формы</span>
    </div>
    <span class="tagline">Atyrau, Kazakhstan</span>
    <div id="header-actions">
      <button class="btn btn-ghost" onclick="saveProject()">💾 Сохранить</button>
      <button class="btn btn-ghost" onclick="loadProject()">📂 Загрузить</button>
      <button class="btn btn-download" onclick="exportCanvas()">⬇ Скачать PNG</button>
    </div>
  </header>

  <!-- ══ LEFT PANEL ═══════════════════════════════════════════════ -->
  <aside id="left-panel">

    <!-- Jersey upload -->
    <div class="section-head">Фон — Форма</div>
    <div class="section-body">
      <label for="file-jersey" class="upload-zone">
        <div class="ico">👕</div>
        <div>Загрузить изображение формы</div>
        <div style="font-size:10px;margin-top:3px;color:#444">PNG / JPG</div>
      </label>
      <input type="file" id="file-jersey" accept="image/png,image/jpeg,image/webp" onchange="loadJersey(event)" />
    </div>

    <!-- Add text -->
    <div class="section-head">Текст</div>
    <div class="section-body">
      <div class="form-group">
        <label>Текст</label>
        <input class="form-input" id="new-text" placeholder="Имя игрока, спонсор..." />
      </div>
      <div class="btn-row">
        <button class="btn btn-panel" onclick="addText()">＋ Добавить текст</button>
        <button class="btn btn-panel" onclick="addNumber()">＃ Номер</button>
      </div>
    </div>

    <!-- Add logo -->
    <div class="section-head">Логотип / Изображение</div>
    <div class="section-body">
      <label for="file-logo" class="upload-zone">
        <div class="ico">🏅</div>
        <div>Загрузить логотип</div>
        <div style="font-size:10px;margin-top:3px;color:#444">PNG / JPG / SVG</div>
      </label>
      <input type="file" id="file-logo" accept="image/*" onchange="addLogo(event)" />
    </div>

    <!-- Custom fonts -->
    <div class="section-head">Шрифты</div>
    <div class="section-body">
      <label for="file-font" class="upload-zone">
        <div class="ico">🔤</div>
        <div>Загрузить шрифт</div>
        <div style="font-size:10px;margin-top:3px;color:#444">TTF / OTF / WOFF</div>
      </label>
      <input type="file" id="file-font" accept=".ttf,.otf,.woff,.woff2" multiple onchange="loadFont(event)" />
      <div id="font-chips"></div>
    </div>

    <!-- Layers -->
    <div class="section-head">Слои</div>
    <ul id="layer-list">
      <li class="empty-state">Слоёв пока нет</li>
    </ul>

  </aside>

  <!-- ══ CANVAS AREA ═══════════════════════════════════════════════ -->
  <main id="canvas-area">
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div id="canvas-placeholder">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9l4-4 4 4 4-4 4 4"/>
        </svg>
        <p>Загрузите изображение формы</p>
        <p class="hint">Используйте панель слева</p>
      </div>
    </div>
  </main>

  <!-- ══ RIGHT PANEL ═══════════════════════════════════════════════ -->
  <aside id="right-panel">
    <div class="section-head">Свойства слоя</div>

    <div id="props-empty" class="empty-state">
      Выберите слой для редактирования
    </div>

    <div id="props-panel">

      <!-- Text props -->
      <div id="text-props">
        <div class="section-body">
          <div class="form-group">
            <label>Текст</label>
            <input class="form-input" id="prop-text" oninput="updateProp('text')" />
          </div>
          <div class="form-group">
            <label>Шрифт</label>
            <select class="form-select" id="prop-font" onchange="updateProp('font')">
              <option value="Inter">Inter</option>
              <option value="Arial">Arial</option>
              <option value="Georgia">Georgia</option>
              <option value="Impact">Impact</option>
              <option value="Courier New">Courier New</option>
            </select>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Размер</label>
              <input class="form-input" type="number" id="prop-fontsize" min="6" max="300" oninput="updateProp('fontSize')" />
            </div>
            <div class="form-group">
              <label>Цвет</label>
              <input type="color" id="prop-color" oninput="updateProp('color')" />
            </div>
          </div>
          <div class="form-group">
            <label>Жирность</label>
            <select class="form-select" id="prop-weight" onchange="updateProp('fontWeight')">
              <option value="normal">Обычный</option>
              <option value="bold">Жирный</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Common props -->
      <div class="section-body">
        <div class="form-group">
          <label>Прозрачность</label>
          <div class="range-row">
            <input type="range" id="prop-opacity" min="0" max="1" step="0.01" oninput="updateProp('opacity')" />
            <span class="range-val" id="prop-opacity-val">100%</span>
          </div>
        </div>
        <div class="form-group">
          <label>Поворот</label>
          <div class="range-row">
            <input type="range" id="prop-angle" min="-180" max="180" step="1" oninput="updateProp('angle')" />
            <span class="range-val" id="prop-angle-val">0°</span>
          </div>
        </div>
      </div>

      <div class="section-body">
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="bringForward()">↑ Вверх</button>
          <button class="btn btn-ghost" onclick="sendBackward()">↓ Вниз</button>
        </div>
        <button class="btn btn-panel" style="color:var(--danger);border-color:#2d1a1a;" onclick="deleteSelected()">
          ✕ Удалить слой
        </button>
      </div>

    </div>
  </aside>

</div>

<!-- Mobile toggle -->
<button class="panel-toggle-btn" onclick="document.getElementById('right-panel').classList.toggle('open')">⚙</button>

<!-- Toast -->
<div id="toast"></div>

<script>
/* ══════════════════════════════════════════════════════════════════
   STATE
══════════════════════════════════════════════════════════════════ */
const state = {
  canvas: null,
  jerseyImg: null,
  customFonts: [],     // [{name, family}]
  layerMeta: new Map() // fabricObj -> {id, type, name}
};

let layerCounter = 0;

/* ══════════════════════════════════════════════════════════════════
   INIT FABRIC CANVAS
══════════════════════════════════════════════════════════════════ */
function initCanvas(w = 600, h = 700) {
  if (state.canvas) {
    state.canvas.dispose();
  }
  const wrap = document.getElementById('canvas-wrap');
  wrap.style.width  = w + 'px';
  wrap.style.height = h + 'px';

  state.canvas = new fabric.Canvas('c', {
    width:               w,
    height:              h,
    backgroundColor:     '#1a1a1a',
    preserveObjectStacking: true,
    selection:           true,
  });

  state.canvas.on('selection:created',  syncPropsPanel);
  state.canvas.on('selection:updated',  syncPropsPanel);
  state.canvas.on('selection:cleared',  clearPropsPanel);
  state.canvas.on('object:modified',    syncPropsPanel);
  state.canvas.on('object:added',       updateLayerList);
  state.canvas.on('object:removed',     updateLayerList);
  state.canvas.on('object:modified',    updateLayerList);
  state.canvas.on('stack:changed',      updateLayerList);
}

initCanvas();

/* ══════════════════════════════════════════════════════════════════
   JERSEY BACKGROUND
══════════════════════════════════════════════════════════════════ */
function loadJersey(e) {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  fabric.Image.fromURL(url, img => {
    // Scale to fit canvas nicely
    const maxW = 700, maxH = 820;
    const scaleX = maxW / img.width;
    const scaleY = maxH / img.height;
    const scale  = Math.min(scaleX, scaleY, 1);
    const W = Math.round(img.width  * scale);
    const H = Math.round(img.height * scale);

    // Re-init canvas to jersey proportions
    state.layerMeta.clear();
    initCanvas(W, H);

    fabric.Image.fromURL(url, jerseyImg => {
      jerseyImg.scaleToWidth(W);
      jerseyImg.set({ selectable: false, evented: false, hoverCursor: 'default' });
      state.canvas.add(jerseyImg);
      state.jerseyImg = jerseyImg;
      document.getElementById('canvas-placeholder').style.opacity = '0';
      updateLayerList();
    });
  });
  e.target.value = '';
}

/* ══════════════════════════════════════════════════════════════════
   ADD TEXT
══════════════════════════════════════════════════════════════════ */
function addText(isNumber = false) {
  const input  = document.getElementById('new-text');
  const raw    = input.value.trim();
  const txt    = raw || (isNumber ? '10' : 'Текст');

  const fSize  = isNumber ? 90 : 36;
  const weight = isNumber ? 'bold' : 'normal';
  const yPos   = state.canvas.height / 2;

  const obj = new fabric.Text(txt, {
    left:       state.canvas.width / 2,
    top:        yPos,
    originX:    'center',
    originY:    'center',
    fontSize:   fSize,
    fontFamily: 'Inter',
    fontWeight: weight,
    fill:       '#ffffff',
    opacity:    1,
    angle:      0,
  });

  const id   = ++layerCounter;
  const name = isNumber ? `Номер: ${txt}` : `Текст: ${txt}`;
  state.layerMeta.set(obj, { id, type: 'text', name });

  state.canvas.add(obj);
  state.canvas.setActiveObject(obj);
  state.canvas.renderAll();
  if (raw) input.value = '';
  updateLayerList();
}

function addNumber() {
  const input = document.getElementById('new-text');
  const prev  = input.value;
  if (!prev.trim()) input.value = '10';
  addText(true);
}

/* ══════════════════════════════════════════════════════════════════
   ADD LOGO/IMAGE
══════════════════════════════════════════════════════════════════ */
function addLogo(e) {
  const file = e.target.files[0];
  if (!file) return;
  const url = URL.createObjectURL(file);
  fabric.Image.fromURL(url, img => {
    const maxDim = Math.min(state.canvas.width, state.canvas.height) * 0.3;
    if (img.width > maxDim || img.height > maxDim) {
      img.scaleToWidth(maxDim);
    }
    img.set({
      left:    state.canvas.width  / 2,
      top:     state.canvas.height / 2,
      originX: 'center',
      originY: 'center',
    });
    const id   = ++layerCounter;
    state.layerMeta.set(img, { id, type: 'image', name: `Лого: ${file.name.split('.')[0]}` });
    state.canvas.add(img);
    state.canvas.setActiveObject(img);
    state.canvas.renderAll();
    updateLayerList();
  });
  e.target.value = '';
}

/* ══════════════════════════════════════════════════════════════════
   CUSTOM FONTS
══════════════════════════════════════════════════════════════════ */
function loadFont(e) {
  const files = Array.from(e.target.files);
  files.forEach(file => {
    const fontName = file.name.replace(/\.[^.]+$/, '').replace(/[^a-zA-Z0-9\-_]/g, '_');
    const url = URL.createObjectURL(file);
    const fontFace = new FontFace(fontName, `url(${url})`);
    fontFace.load().then(loaded => {
      document.fonts.add(loaded);
      state.customFonts.push({ name: file.name, family: fontName });
      addFontOption(fontName);
      addFontChip(fontName);
      showToast(`Шрифт загружен: ${file.name}`);
    }).catch(() => showToast('Ошибка загрузки шрифта'));
  });
  e.target.value = '';
}

function addFontOption(family) {
  ['prop-font'].forEach(id => {
    const sel = document.getElementById(id);
    const opt = document.createElement('option');
    opt.value = family;
    opt.textContent = family;
    sel.appendChild(opt);
  });
}

function addFontChip(family) {
  const wrap = document.getElementById('font-chips');
  const chip = document.createElement('span');
  chip.className = 'font-chip';
  chip.dataset.family = family;
  chip.innerHTML = `<span>${family}</span><button onclick="removeFont('${family}')">✕</button>`;
  wrap.appendChild(chip);
}

function removeFont(family) {
  // Remove from selects
  document.querySelectorAll('#prop-font option').forEach(o => {
    if (o.value === family) o.remove();
  });
  // Remove chip
  document.querySelectorAll(`[data-family="${family}"]`).forEach(el => el.remove());
  state.customFonts = state.customFonts.filter(f => f.family !== family);
}

/* ══════════════════════════════════════════════════════════════════
   PROPERTIES PANEL
══════════════════════════════════════════════════════════════════ */
function syncPropsPanel() {
  const obj = state.canvas.getActiveObject();
  if (!obj || obj.type === 'activeSelection') { clearPropsPanel(); return; }

  document.getElementById('props-empty').style.display = 'none';
  document.getElementById('props-panel').classList.add('visible');

  const isText = obj.type === 'text' || obj.type === 'i-text';
  document.getElementById('text-props').style.display = isText ? 'block' : 'none';

  if (isText) {
    document.getElementById('prop-text').value     = obj.text || '';
    document.getElementById('prop-font').value     = obj.fontFamily || 'Inter';
    document.getElementById('prop-fontsize').value = Math.round(obj.fontSize) || 36;
    document.getElementById('prop-color').value    = obj.fill || '#ffffff';
    document.getElementById('prop-weight').value   = obj.fontWeight || 'normal';
  }

  const op = obj.opacity ?? 1;
  document.getElementById('prop-opacity').value     = op;
  document.getElementById('prop-opacity-val').textContent = Math.round(op * 100) + '%';

  const ang = Math.round(obj.angle ?? 0);
  document.getElementById('prop-angle').value     = ang;
  document.getElementById('prop-angle-val').textContent = ang + '°';
}

function clearPropsPanel() {
  document.getElementById('props-empty').style.display = '';
  document.getElementById('props-panel').classList.remove('visible');
}

function updateProp(prop) {
  const obj = state.canvas.getActiveObject();
  if (!obj) return;

  if (prop === 'text') {
    obj.set('text', document.getElementById('prop-text').value);
    const meta = state.layerMeta.get(obj);
    if (meta) meta.name = `Текст: ${obj.text.substring(0,20)}`;
    updateLayerList();
  } else if (prop === 'font') {
    obj.set('fontFamily', document.getElementById('prop-font').value);
  } else if (prop === 'fontSize') {
    obj.set('fontSize', parseInt(document.getElementById('prop-fontsize').value) || 36);
  } else if (prop === 'color') {
    obj.set('fill', document.getElementById('prop-color').value);
  } else if (prop === 'fontWeight') {
    obj.set('fontWeight', document.getElementById('prop-weight').value);
  } else if (prop === 'opacity') {
    const val = parseFloat(document.getElementById('prop-opacity').value);
    obj.set('opacity', val);
    document.getElementById('prop-opacity-val').textContent = Math.round(val * 100) + '%';
  } else if (prop === 'angle') {
    const ang = parseInt(document.getElementById('prop-angle').value);
    obj.set('angle', ang);
    document.getElementById('prop-angle-val').textContent = ang + '°';
  }

  state.canvas.requestRenderAll();
}

/* ══════════════════════════════════════════════════════════════════
   LAYER LIST
══════════════════════════════════════════════════════════════════ */
function updateLayerList() {
  const list = document.getElementById('layer-list');
  const objects = state.canvas.getObjects();
  // Filter out jersey background (non-selectable)
  const layers = objects.filter(o => o.selectable !== false);

  if (layers.length === 0) {
    list.innerHTML = '<li class="empty-state">Слоёв пока нет</li>';
    return;
  }

  const active = state.canvas.getActiveObject();
  list.innerHTML = '';

  // Reverse so top layers appear first
  [...layers].reverse().forEach(obj => {
    const meta = state.layerMeta.get(obj) || { type: 'unknown', name: 'Слой' };
    const icon = meta.type === 'text' ? '📝' : meta.type === 'image' ? '🖼' : '◻';
    const isActive = obj === active;

    const li = document.createElement('li');
    li.className = 'layer-item' + (isActive ? ' active' : '');
    li.innerHTML = `
      <span class="layer-icon">${icon}</span>
      <span class="layer-name">${meta.name}</span>
      <span class="layer-actions">
        <button title="Вверх" onclick="moveLayerUp(event, this)">↑</button>
        <button title="Вниз" onclick="moveLayerDown(event, this)">↓</button>
        <button title="Удалить" class="del" onclick="removeLayerItem(event, this)">✕</button>
      </span>`;

    li.addEventListener('click', function(e) {
      if (e.target.tagName === 'BUTTON') return;
      state.canvas.setActiveObject(obj);
      state.canvas.requestRenderAll();
      syncPropsPanel();
      updateLayerList();
    });

    // Store reference
    li._fabricObj = obj;
    li.dataset.idx = layers.indexOf(obj);
    list.appendChild(li);
  });
}

function moveLayerUp(e, btn) {
  e.stopPropagation();
  const obj = getObjFromBtn(btn);
  if (obj) { state.canvas.bringForward(obj); state.canvas.requestRenderAll(); updateLayerList(); }
}

function moveLayerDown(e, btn) {
  e.stopPropagation();
  const obj = getObjFromBtn(btn);
  if (obj) { state.canvas.sendBackwards(obj); state.canvas.requestRenderAll(); updateLayerList(); }
}

function removeLayerItem(e, btn) {
  e.stopPropagation();
  const obj = getObjFromBtn(btn);
  if (obj) { state.canvas.remove(obj); state.layerMeta.delete(obj); updateLayerList(); clearPropsPanel(); }
}

function getObjFromBtn(btn) {
  const li = btn.closest('.layer-item');
  // Walk canvas objects to match
  const layers = state.canvas.getObjects().filter(o => o.selectable !== false);
  const name = li.querySelector('.layer-name').textContent;
  // Match by layerMeta name
  for (const [obj, meta] of state.layerMeta.entries()) {
    if (meta.name === name && layers.includes(obj)) return obj;
  }
  return null;
}

/* ══════════════════════════════════════════════════════════════════
   SELECTED OBJ CONTROLS
══════════════════════════════════════════════════════════════════ */
function deleteSelected() {
  const obj = state.canvas.getActiveObject();
  if (!obj) return;
  state.canvas.remove(obj);
  state.layerMeta.delete(obj);
  clearPropsPanel();
  updateLayerList();
}

function bringForward() {
  const obj = state.canvas.getActiveObject();
  if (obj) { state.canvas.bringForward(obj); state.canvas.requestRenderAll(); updateLayerList(); }
}

function sendBackward() {
  const obj = state.canvas.getActiveObject();
  if (obj) { state.canvas.sendBackwards(obj); state.canvas.requestRenderAll(); updateLayerList(); }
}

/* ══════════════════════════════════════════════════════════════════
   EXPORT — always composites watermark
══════════════════════════════════════════════════════════════════ */
function exportCanvas() {
  // Deselect all first
  state.canvas.discardActiveObject();
  state.canvas.requestRenderAll();

  const dataURL = state.canvas.toDataURL({ format: 'png', multiplier: 1 });

  // Load watermark and composite
  const wm = new Image();
  wm.crossOrigin = 'anonymous';
  wm.src = 'watermark.png';
  wm.onload = function() {
    const offscreen = document.createElement('canvas');
    offscreen.width  = state.canvas.width;
    offscreen.height = state.canvas.height;
    const ctx = offscreen.getContext('2d');

    // Draw main canvas
    const base = new Image();
    base.onload = function() {
      ctx.drawImage(base, 0, 0);

      // Watermark: centered, max 40% width, 35% opacity
      const wmMaxW  = offscreen.width  * 0.40;
      const wmScale = Math.min(wmMaxW / wm.width, 1);
      const wmW = wm.width  * wmScale;
      const wmH = wm.height * wmScale;
      const wmX = (offscreen.width  - wmW) / 2;
      const wmY = (offscreen.height - wmH) / 2;

      ctx.globalAlpha = 0.35;
      ctx.drawImage(wm, wmX, wmY, wmW, wmH);
      ctx.globalAlpha = 1;

      // Download
      offscreen.toBlob(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'derby-ftbl-jersey.png';
        a.click();
        showToast('Изображение скачано!');
      }, 'image/png');
    };
    base.src = dataURL;
  };
  wm.onerror = function() {
    // Watermark not found — export without it but show warning
    showToast('⚠ Файл watermark.png не найден');
    const a = document.createElement('a');
    a.href = dataURL;
    a.download = 'derby-ftbl-jersey.png';
    a.click();
  };
}

/* ══════════════════════════════════════════════════════════════════
   SAVE / LOAD PROJECT
══════════════════════════════════════════════════════════════════ */
function saveProject() {
  try {
    const json = state.canvas.toJSON(['selectable', 'evented', 'hoverCursor']);
    localStorage.setItem('derby_project', JSON.stringify(json));
    localStorage.setItem('derby_canvas_size', JSON.stringify({
      w: state.canvas.width, h: state.canvas.height
    }));
    showToast('Проект сохранён');
  } catch(e) { showToast('Ошибка сохранения'); }
}

function loadProject() {
  const raw = localStorage.getItem('derby_project');
  if (!raw) { showToast('Нет сохранённого проекта'); return; }
  try {
    const json = JSON.parse(raw);
    const size = JSON.parse(localStorage.getItem('derby_canvas_size') || '{"w":600,"h":700}');
    state.layerMeta.clear();
    initCanvas(size.w, size.h);
    state.canvas.loadFromJSON(json, () => {
      state.canvas.requestRenderAll();
      // Rebuild layerMeta for loaded objects
      state.canvas.getObjects().forEach(obj => {
        if (obj.selectable === false) return;
        const id   = ++layerCounter;
        const type = (obj.type === 'text' || obj.type === 'i-text') ? 'text' : 'image';
        const name = type === 'text' ? `Текст: ${obj.text?.substring(0, 20)}` : 'Изображение';
        state.layerMeta.set(obj, { id, type, name });
      });
      updateLayerList();
      document.getElementById('canvas-placeholder').style.opacity = '0';
      showToast('Проект загружен');
    });
  } catch(e) { showToast('Ошибка загрузки проекта'); }
}

/* ══════════════════════════════════════════════════════════════════
   TOAST
══════════════════════════════════════════════════════════════════ */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ══════════════════════════════════════════════════════════════════
   KEYBOARD SHORTCUTS
══════════════════════════════════════════════════════════════════ */
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.key === 'Delete' || e.key === 'Backspace') deleteSelected();
  if (e.key === 'Escape') { state.canvas.discardActiveObject(); state.canvas.requestRenderAll(); }
});
</script>
